name: Update Rubber Price

on:
  workflow_dispatch:
    inputs:
      price:
        description: "Today's RSS-4 price in Rs per kg (e.g. 282)"
        required: true

permissions:
  contents: write

jobs:
  update-price:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update price history
        env:
          NEW_PRICE: ${{ github.event.inputs.price }}
        run: |
          python3 <<'PYEOF'
          import json, datetime, os

          path = "data/price-history.json"
          with open(path) as f:
              history = json.load(f)

          today_price = float(os.environ["NEW_PRICE"])
          last_price = history[-1]["price"] if history else today_price
          change = ((today_price - last_price) / last_price * 100) if last_price else 0
          direction = "up" if change > 0 else ("down" if change < 0 else "flat")

          entry = {
              "date": datetime.date.today().isoformat(),
              "price": today_price,
              "change_percent": round(change, 1),
              "direction": direction
          }
          history.append(entry)

          with open(path, "w") as f:
              json.dump(history, f, indent=2)
          PYEOF

      - name: Commit and push
        env:
          NEW_PRICE: ${{ github.event.inputs.price }}
        run: |
          git config user.name "RubberMate Bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/price-history.json
          git commit -m "Update price: Rs ${NEW_PRICE}/kg" || echo "Nothing to commit"
          git push
